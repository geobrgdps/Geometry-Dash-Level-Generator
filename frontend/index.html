<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDL - Geometry Dash Level Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #22c55e;
            --text-color: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: var(--accent-color);
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .output-box {
            margin-top: 24px;
            padding: 16px;
            background-color: #0f172a;
            border-radius: 8px;
            display: none;
        }

        .output-box code {
            word-break: break-all;
            font-size: 0.85rem;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GDL Generator</h1>
        <p class="subtitle">Transforme descrições em níveis de Geometry Dash</p>

        <div class="form-group">
            <label for="prompt">Descrição do Level (Prompt)</label>
            <textarea id="prompt" placeholder="Ex: Crie uma fase Demon inspirada em Nine Circles com velocidade 2x..."></textarea>
        </div>

        <div class="form-group">
            <label for="difficulty">Dificuldade Preferencial</label>
            <select id="difficulty">
                <option value="auto">Automático (pelo prompt)</option>
                <option value="easy">Easy</option>
                <option value="normal">Normal</option>
                <option value="hard">Hard</option>
                <option value="demon">Demon</option>
            </select>
        </div>

        <button onclick="generateLevel()">Gerar Level (.gmd)</button>

        <div id="output" class="output-box">
            <p><strong>String Gerada:</strong></p>
            <code id="level-data"></code>
        </div>
    </div>

    <script>
        function generateLevel() {
            const prompt = document.getElementById('prompt').value;
            if (!prompt) {
                alert('Por favor, digite um prompt!');
                return;
            }
            
            // Simulação local de geração para a v0.1
            document.getElementById('output').style.display = 'block';
            document.getElementById('level-data').innerText = '1,1,2,0.0,3,0.0;1,1,2,30.0,3,0.0;1,8,2,60.0,3,30.0;';
        }
    </script>
</body>
</html>
